<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2perday@homelab: ~</title>
  <meta name="description"
    content="Homelab terminal portfolio by 2perday — Data Center Operator, Infrastructure Engineer">
  <meta property="og:title" content="2perday.dev">
  <meta property="og:description" content="Homelab terminal portfolio — Data Center Operator @NHN Enterprise">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      background: #171717;
      color: #d4d4d4;
      font-family: 'Ubuntu Mono', monospace;
      font-size: 14px;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
    }

    .terminal {
      max-width: 820px;
      width: 100%;
      max-height: 620px;
      height: 100%;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
    }

    .titlebar {
      background: #2d2d2d;
      padding: 6px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      border-bottom: 1px solid #1a1a1a;
    }

    .titlebar-title {
      color: #999;
      font-size: 13px;
    }

    .body {
      background: #1a1a1a;
      padding: 16px 20px;
      cursor: text;
      flex: 1;
      overflow-y: auto;
      line-height: 1.5;
    }

    .body::-webkit-scrollbar {
      width: 8px;
    }

    .body::-webkit-scrollbar-track {
      background: #1a1a1a;
    }

    .body::-webkit-scrollbar-thumb {
      background: #3a3a3a;
      border-radius: 4px;
    }

    .body::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    pre {
      font-family: 'Ubuntu Mono', monospace;
      white-space: pre;
      font-weight: bold;
      color: #5faf5f;
      margin: 0 0 8px;
      font-size: 11px;
    }

    .user {
      color: #5faf5f;
      font-weight: bold;
    }

    .sep {
      color: #d4d4d4;
    }

    .path {
      color: #5f87ff;
      font-weight: bold;
    }

    .dollar {
      color: #d4d4d4;
    }

    .cmd {
      color: #e4e4e4;
    }

    .line {
      margin: 10px 0 2px;
    }

    .output-line {
      color: #d4d4d4;
      margin: 1px 0;
      padding-left: 2px;
      white-space: pre;
    }

    .motd {
      color: #6c6c6c;
      margin: 1px 0;
      min-height: 1em;
      white-space: pre;
    }

    .motd-highlight {
      color: #d7875f;
    }

    .motd-info {
      color: #87afd7;
    }

    .error {
      color: #d75f5f;
    }

    a {
      color: #5fafff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .input-line {
      display: flex;
      align-items: center;
      margin-top: 10px;
    }

    #input {
      background: none;
      border: none;
      padding: 0;
      color: #e4e4e4;
      font-family: 'Ubuntu Mono', monospace;
      font-size: 14px;
      outline: none;
      flex: 1;
      caret-color: #d4d4d4;
    }
  </style>
</head>

<body>
  <div class="terminal">
    <div class="titlebar">
      <span class="titlebar-title">2perday@homelab:~</span>
    </div>
    <div class="body" id="body">
      <div id="history"></div>
      <div class="input-line">
        <span class="user">2perday@homelab</span><span class="sep">:</span><span class="path">~</span><span
          class="dollar">$&nbsp;</span>
        <input id="input" type="text" autofocus spellcheck="false" autocomplete="off">
      </div>
    </div>
  </div>

  <script>
    const PROMPT = '<span class="user">2perday@homelab</span><span class="sep">:</span><span class="path">~</span><span class="dollar">$ </span>';

    const ASCII = `
      _/_/                                        _/                                _/
   _/    _/  _/_/_/      _/_/    _/  _/_/    _/_/_/    _/_/_/  _/    _/        _/_/_/    _/_/    _/      _/
      _/    _/    _/  _/_/_/_/  _/_/      _/    _/  _/    _/  _/    _/      _/    _/  _/_/_/_/  _/      _/
   _/      _/    _/  _/        _/        _/    _/  _/    _/  _/    _/      _/    _/  _/          _/  _/
_/_/_/_/  _/_/_/      _/_/_/  _/          _/_/_/    _/_/_/    _/_/_/  _/    _/_/_/    _/_/_/      _/
         _/                                                      _/
        _/                                                  _/_/`;

    const commands = {
      help: () => [
        '',
        '&nbsp;&nbsp;Usage: [command]',
        '',
        '&nbsp;&nbsp;<span class="motd-info">interests</span>    What I work on',
        '&nbsp;&nbsp;<span class="motd-info">hobbies</span>      Life outside of work',
        '',
        '&nbsp;&nbsp;<span class="motd-info">motd</span>         Show welcome message',
        '&nbsp;&nbsp;<span class="motd-info">help</span>         Show this message',
        '&nbsp;&nbsp;<span class="motd-info">clear</span>        Clear terminal',
        '',
      ],
      interests: () => [
        'Infrastructure',
        'Network Engineering',
        'Systems Engineering',
        'DevOps',
      ],
      hobbies: () => [
        'Flim Photography',
        'Amateur Radio',
        'Audio Engineering',
        'Coffee',
      ],
      motd: () => { showMotd(); return []; },
    };

    const hist = document.getElementById('history');
    const input = document.getElementById('input');
    const body = document.getElementById('body');
    const cmdHistory = [];
    let histIdx = -1;

    function addLine(html, cls) {
      const div = document.createElement('div');
      div.className = cls || 'output-line';
      div.innerHTML = html;
      hist.appendChild(div);
    }

    function addPrompt(cmd) {
      const div = document.createElement('div');
      div.className = 'line';
      div.innerHTML = PROMPT + '<span class="cmd">' + escapeHtml(cmd) + '</span>';
      hist.appendChild(div);
    }

    function addAscii() {
      const pre = document.createElement('pre');
      pre.textContent = ASCII;
      hist.appendChild(pre);
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function scrollBottom() {
      body.scrollTop = body.scrollHeight;
    }

    function exec(raw) {
      const cmd = raw.trim().toLowerCase();
      addPrompt(raw.trim());

      if (!cmd) { scrollBottom(); return; }

      if (cmd === 'clear') {
        hist.innerHTML = '';
        return;
      }

      const fn = commands[cmd];
      if (!fn) {
        addLine('bash: ' + escapeHtml(cmd) + ': command not found', 'output-line error');
        scrollBottom();
        return;
      }

      const lines = fn();
      for (const line of lines) {
        if (line === '__ASCII__') {
          addAscii();
        } else {
          addLine(line);
        }
      }
      scrollBottom();
    }

    function showMotd() {
      const now = new Date();
      const weekday = now.toLocaleDateString('en-US', { weekday: 'short' });
      const month = now.toLocaleDateString('en-US', { month: 'short' });
      const day = now.getDate();
      const year = now.getFullYear();
      const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
      const dateStr = weekday + ' ' + month + ' ' + day + ' ' + timeStr + ' KST ' + year;

      addLine('Welcome to <span class="motd-highlight">2perday.dev</span>', 'motd');
      addLine('', 'motd');
      addLine('&nbsp;* GitHub:  <a href="https://github.com/2perday" target="_blank">https://github.com/2perday</a>', 'motd');
      addLine('', 'motd');
      addLine('&nbsp;System information as of ' + dateStr, 'motd');
      addLine('', 'motd');
      addLine('&nbsp;&nbsp;DNS:           <span class="motd-info">Cloudflare DDNS</span>', 'motd');
      addLine('&nbsp;&nbsp;Reverse Proxy: <span class="motd-info">NPM Plus</span>', 'motd');
      addLine('&nbsp;&nbsp;Security:      <span class="motd-info">CrowdSec</span>', 'motd');
      addLine('&nbsp;&nbsp;Webserver:     <span class="motd-info">Nginx</span>', 'motd');
      addLine('&nbsp;&nbsp;Hardware:      <span class="motd-info">DELL OptiPlex 3050</span>', 'motd');
      addLine('', 'motd');
      addLine('&nbsp;* <span class="motd-highlight">Data Center Operator at NHN Enterprise</span>', 'motd');
      addLine('&nbsp;&nbsp;&nbsp;13th Samsung Software Academy for Youth', 'motd');
      addLine('&nbsp;&nbsp;&nbsp;B.S. in Electrical Engineering', 'motd');
      addLine('', 'motd');
      addAscii();
      addLine('', 'motd');
      addLine('Type <span class="cmd">help</span> for available commands.', 'motd');
    }

    showMotd();

    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        const val = input.value;
        if (val.trim()) {
          cmdHistory.unshift(val.trim());
        }
        histIdx = -1;
        exec(val);
        input.value = '';
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (histIdx < cmdHistory.length - 1) {
          histIdx++;
          input.value = cmdHistory[histIdx];
        }
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (histIdx > 0) {
          histIdx--;
          input.value = cmdHistory[histIdx];
        } else {
          histIdx = -1;
          input.value = '';
        }
      }
    });

    body.addEventListener('click', function (e) {
      if (e.target.tagName !== 'A') input.focus();
    });
  </script>
</body>

</html>
